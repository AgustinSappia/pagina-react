<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas de Paisajes Monásticos</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --parchment: #f5eedc;
    --ink: #2a1f0e;
    --gold: #8b6914;
    --gold-light: #c9a84c;
    --olive: #5a6e2c;
    --panel-bg: rgba(245,238,220,0.97);
    --shadow: 0 4px 20px rgba(42,31,14,0.25);
    --border: 1px solid rgba(139,105,20,0.35);
  }

  body {
    font-family: 'EB Garamond', Georgia, serif;
    background: var(--ink);
    color: var(--ink);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: linear-gradient(135deg, #1a1208 0%, #2e2010 50%, #1a1208 100%);
    border-bottom: 2px solid var(--gold);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  header .ornament { color: var(--gold-light); font-size: 22px; }

  header h1 {
    font-family: 'Cinzel', serif;
    color: var(--gold-light);
    font-size: 1.15rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }

  header p {
    color: rgba(201,168,76,0.7);
    font-style: italic;
    font-size: 0.85rem;
    margin-top: 1px;
  }

  #map-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #map { width: 100%; height: 100%; }

  /* ── TIME SLIDER ── */
  #time-panel {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    background: var(--panel-bg);
    border: var(--border);
    border-radius: 6px;
    box-shadow: var(--shadow);
    padding: 8px 18px 10px;
    min-width: 360px;
    text-align: center;
  }

  #time-label {
    font-family: 'Cinzel', serif;
    font-size: 1.05rem;
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  #time-slider {
    -webkit-appearance: none;
    width: 100%;
    height: 5px;
    border-radius: 3px;
    background: linear-gradient(to right, var(--gold) 0%, var(--gold) 50%, #ccc 50%);
    outline: none;
    cursor: pointer;
  }

  #time-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--gold);
    border: 2px solid var(--ink);
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  #time-range-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: #7a6640;
    margin-top: 3px;
  }

  /* ── LEGEND PANEL ── */
  #legend {
    position: absolute;
    top: 14px;
    right: 14px;
    z-index: 1000;
    background: var(--panel-bg);
    border: var(--border);
    border-radius: 6px;
    box-shadow: var(--shadow);
    min-width: 220px;
    overflow: hidden;
  }

  #legend-header {
    background: var(--olive);
    color: #fff;
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    padding: 7px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }

  #legend-header button {
    background: none;
    border: none;
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
    line-height: 1;
    padding: 0 2px;
  }

  #legend-body { padding: 8px 10px 10px; }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 2px;
    cursor: pointer;
    border-radius: 3px;
    transition: background 0.15s;
  }

  .legend-item:hover { background: rgba(139,105,20,0.1); }

  .legend-item input[type=checkbox] {
    accent-color: var(--gold);
    cursor: pointer;
    width: 14px; height: 14px;
  }

  .legend-swatch {
    width: 18px; height: 18px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.2);
    flex-shrink: 0;
  }

  .legend-item label {
    font-size: 0.82rem;
    cursor: pointer;
    color: var(--ink);
  }

  /* ── SHOW POPULATIONS ── */
  #pop-panel {
    position: absolute;
    top: 14px;
    left: 14px;
    z-index: 1000;
    background: var(--panel-bg);
    border: var(--border);
    border-radius: 5px;
    box-shadow: var(--shadow);
    padding: 7px 12px;
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.82rem;
    color: var(--ink);
    cursor: pointer;
  }

  #pop-panel input { accent-color: var(--gold); cursor: pointer; }

  /* ── POPUP ── */
  .leaflet-popup-content-wrapper {
    background: var(--panel-bg);
    border: var(--border);
    border-radius: 6px;
    box-shadow: var(--shadow);
    font-family: 'EB Garamond', serif;
  }

  .leaflet-popup-content { margin: 12px 16px; }
  .leaflet-popup-content h3 {
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .leaflet-popup-content p { font-size: 0.82rem; color: #555; line-height: 1.5; }
  .leaflet-popup-tip { background: var(--parchment); }
</style>
</head>
<body>

<header>
  <span class="ornament">✦</span>
  <div>
    <h1>Atlas de Paisajes Monásticos</h1>
    <p>Órdenes religiosas femeninas — Península Ibérica y Mediterráneo, siglos XIV–XVI</p>
  </div>
</header>

  </div>

  <!-- Show Populations toggle -->
  <div id="pop-panel">
    <input type="checkbox" id="show-pop">

  </div>

  <div id="legend">

      <button id="legend-toggle">−</button>
    </div>

</div>

// Regions: [id, name, order_id, GeoJSON-like polygon coords]

  {

// Time periods
const TIME_PERIODS = [

  { label: '1500 – 1550', min: 1500, max: 1550 },
  { label: '1550 – 1600', min: 1550, max: 1600 },
  { label: '1600 – 1650', min: 1600, max: 1650 },
  { label: '1650 – 1700', min: 1650, max: 1700 },
  { label: '1700 – 1750', min: 1700, max: 1750 },
  { label: '1750 – 1800', min: 1750, max: 1800 },
  { label: '1800 – 1850', min: 1800, max: 1850 },
  { label: '1850 – 1900', min: 1850, max: 1900 }
];

// ─── MAP INIT ─────────────────────────────────────────────────────────────────

const map = L.map('map', {
  center: [-6.472535, -65.404783],
  zoom: 4,
  zoomControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  maxZoom: 18,
}).addTo(map);

// ─── STATE ────────────────────────────────────────────────────────────────────

let activeOrders = new Set(ORDERS.map(o => o.id));
let currentPeriodIdx = 1;
let showPop = false;

const markerLayers = {};
const regionLayers = {};
let popLayer = null;

// ─── LEGEND ───────────────────────────────────────────────────────────────────

const legendBody = document.getElementById('legend-body');
ORDERS.forEach(order => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `
    <input type="checkbox" id="cb-${order.id}" checked>
    <div class="legend-swatch" style="background:${order.color}"></div>
    <label for="cb-${order.id}">${order.label}</label>
  `;
  legendBody.appendChild(item);

  const cb = item.querySelector('input');
  cb.addEventListener('change', () => {
    if (cb.checked) activeOrders.add(order.id);
    else activeOrders.delete(order.id);
    renderMap();
  });
});

function toggleLegend() {
  const body = document.getElementById('legend-body');
  const btn = document.getElementById('legend-toggle');
  if (body.style.display === 'none') {
    body.style.display = '';
    btn.textContent = '−';
  } else {
    body.style.display = 'none';
    btn.textContent = '+';
  }
}

// ─── MARKER ICONS ─────────────────────────────────────────────────────────────

function makeIcon(color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="36" viewBox="0 0 24 36">
    <path d="M12 0C5.37 0 0 5.37 0 12c0 9 12 24 12 24S24 21 24 12C24 5.37 18.63 0 12 0z" fill="${color}" stroke="rgba(0,0,0,0.35)" stroke-width="1"/>
    <circle cx="12" cy="12" r="5" fill="rgba(255,255,255,0.55)"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [24, 36],
    iconAnchor: [12, 36],
    popupAnchor: [0, -36],
  });
}

// ─── RENDER ───────────────────────────────────────────────────────────────────

function getOrderColor(orderId) {
  return (ORDERS.find(o => o.id === orderId) || {}).color || '#888';
}

function renderMap() {
  const period = TIME_PERIODS[currentPeriodIdx];

  // Clear old
  Object.values(markerLayers).forEach(l => map.removeLayer(l));
  Object.values(regionLayers).forEach(l => map.removeLayer(l));
  if (popLayer) { map.removeLayer(popLayer); popLayer = null; }

  // Regions
  REGIONS.forEach(r => {
    if (!activeOrders.has(r.order)) return;
    const poly = L.polygon(r.coords, {
      color: r.color,
      fillColor: r.color,
      fillOpacity: 0.25,
      weight: 1.5,
      dashArray: '4,4',
    });
    poly.bindPopup(`<h3>${r.name}</h3><p>Orden predominante: ${ORDERS.find(o=>o.id===r.order)?.label||r.order}</p>`);
    poly.addTo(map);
    regionLayers[r.id] = poly;
  });

  // Monasteries
  MONASTERIES.forEach((m, i) => {
    const [lat, lng, name, order, founded, desc] = m;
    if (!activeOrders.has(order)) return;
    if (founded < period.min || founded >= period.max) return;

    const color = getOrderColor(order);
    const marker = L.marker([lat, lng], { icon: makeIcon(color) });
    marker.bindPopup(`
      <h3>${name}</h3>
      <p><b>Orden:</b> ${ORDERS.find(o=>o.id===order)?.label||order}<br>
      <b>Fundación:</b> ${founded}<br>
      ${desc}</p>
    `);
    marker.addTo(map);
    markerLayers[`m-${i}`] = marker;
  });

  // Populations (city labels)
  if (showPop) {
    const cities = [
      [41.38, 2.17, 'Barcelona'], [40.41, -3.70, 'Madrid'], [37.38, -5.98, 'Sevilla'],
      [39.46, -0.37, 'Valencia'], [36.72, -4.42, 'Málaga'], [37.88, -4.78, 'Córdoba'],
      [40.96, -5.66, 'Salamanca'], [43.26, -2.92, 'Bilbao'], [42.84, -8.55, 'Santiago'],
      [38.71, -9.14, 'Lisboa'], [41.89, 12.48, 'Roma'], [40.85, 14.27, 'Nápoles'],
      [37.50, 15.08, 'Palermo'], [43.31, -1.98, 'Pamplona'], [39.86, -4.02, 'Toledo'],
    ];
    cities.forEach(([lat, lng, name]) => {
      const icon = L.divIcon({
        html: `<span style="font-family:'EB Garamond',serif;font-size:11px;color:#2a1f0e;
          background:rgba(245,238,220,0.85);padding:1px 4px;border-radius:2px;
          border:1px solid rgba(139,105,20,0.3);white-space:nowrap;">${name}</span>`,
        className: '',
        iconAnchor: [0, 8],
      });
      const m = L.marker([lat, lng], { icon, interactive: false });
      m.addTo(map);
      if (!popLayer) popLayer = m;
      else {
        // group into a simple array trick
        if (!Array.isArray(popLayer)) popLayer = [popLayer];
        popLayer.push(m);
      }
    });
  }
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────────

const slider = document.getElementById('time-slider');
const timeLabel = document.getElementById('time-label');

slider.addEventListener('input', () => {
  currentPeriodIdx = parseInt(slider.value);
  timeLabel.textContent = TIME_PERIODS[currentPeriodIdx].label;
  updateSliderBg();
  renderMap();
});

function updateSliderBg() {
  const pct = (parseInt(slider.value) / (slider.max - slider.min)) * 100;
  slider.style.background = `linear-gradient(to right, var(--gold) 0%, var(--gold) ${pct}%, #ccc ${pct}%)`;
}

document.getElementById('show-pop').addEventListener('change', function() {
  showPop = this.checked;
  renderMap();
});

// ─── BOOT ─────────────────────────────────────────────────────────────────────

renderMap();
updateSliderBg();
</script>
